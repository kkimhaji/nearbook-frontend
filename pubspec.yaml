name: nearbook_frontend
description: NearBook - 수첩 방명록 앱
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_ble_peripheral: ^2.1.0

  # 네트워크
  dio: ^5.7.0

  # 상태관리
  flutter_riverpod: ^2.6.1

  # 소켓
  socket_io_client: ^3.0.0

  # BLE
  flutter_blue_plus: ^1.35.3

  # 로컬 저장소 (토큰 저장)
  flutter_secure_storage: ^9.2.2

  # 라우팅
  go_router: ^14.6.2

  image_picker: ^1.1.2        # 갤러리/카메라에서 이미지 선택
  cached_network_image: ^3.4.1 # 네트워크 이미지 캐싱
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true